[graph]
targets = []
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Known advisories in transitive deps — track for upstream fixes
ignore = [
    "RUSTSEC-2026-0007",  # bytes: integer overflow in BytesMut::reserve (transitive via reqwest)
    "RUSTSEC-2025-0134",  # rustls-pemfile: unmaintained (transitive via rustls)
    "RUSTSEC-2026-0049",  # webpki: CRL Distribution Point matching (transitive via rustls-webpki)
    "RUSTSEC-2026-0009",  # yasna: stack exhaustion in recursive parsing (transitive via x509-parser)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
