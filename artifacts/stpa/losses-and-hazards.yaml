artifacts:
  # ---------------------------------------------------------------------------
  # Losses
  # ---------------------------------------------------------------------------
  - id: L-1
    type: loss
    title: Loss of module integrity
    status: approved
    description: >
      A tampered or malicious WebAssembly module is accepted as legitimately
      signed, allowing unauthorized code to execute in environments that rely
      on signature verification for supply-chain security.

  - id: L-2
    type: loss
    title: Loss of key confidentiality
    status: approved
    description: >
      Private key material is exposed to unauthorized parties, enabling
      forgery of signatures and complete compromise of the signing identity.

  - id: L-3
    type: loss
    title: Loss of signer accountability
    status: approved
    description: >
      Signing provenance is falsified or cannot be verified, resulting in a
      non-repudiation failure that undermines auditability and trust in the
      software supply chain.

  - id: L-4
    type: loss
    title: Loss of verification availability
    status: approved
    description: >
      Legitimate modules cannot be verified, blocking deployment pipelines
      and denying service to systems that depend on successful signature
      verification before loading WebAssembly modules.

  - id: L-5
    type: loss
    title: Loss of trust chain integrity
    status: approved
    description: >
      The trust bundle or certificate chain is compromised, undermining all
      verification operations that depend on the chain of trust and
      potentially allowing wholesale acceptance of malicious modules.

  # ---------------------------------------------------------------------------
  # Hazards
  # ---------------------------------------------------------------------------
  - id: H-1
    type: hazard
    title: Signature verification accepts invalid signature
    status: approved
    description: >
      The signature verification logic incorrectly accepts a signature that
      does not cryptographically match the module content and signing key,
      allowing a tampered module to pass verification.
    links:
      - type: leads-to-loss
        target: L-1

  - id: H-2
    type: hazard
    title: Signature verification rejects valid signature
    status: approved
    description: >
      The signature verification logic incorrectly rejects a signature that
      is cryptographically valid, preventing legitimate modules from being
      deployed.
    links:
      - type: leads-to-loss
        target: L-4

  - id: H-3
    type: hazard
    title: Key material exists in accessible memory after use
    status: approved
    description: >
      Private key material remains in process memory after signing operations
      complete, where it can be extracted through memory dumps, core files,
      or co-resident process attacks.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-4
    type: hazard
    title: Key material stored with insufficient permissions
    status: approved
    description: >
      Private key files are stored on disk with overly permissive file
      permissions, allowing other users or processes on the system to read
      the key material.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-5
    type: hazard
    title: OIDC token replayed or forged in keyless signing
    status: approved
    description: >
      An OIDC identity token used during keyless signing is replayed or
      forged, allowing an attacker to obtain a signing certificate for an
      identity they do not control.
    links:
      - type: leads-to-loss
        target: L-1
      - type: leads-to-loss
        target: L-3

  - id: H-6
    type: hazard
    title: Rekor transparency log entry not verified
    status: approved
    description: >
      A keyless signature is accepted without verifying the corresponding
      Rekor transparency log inclusion proof, eliminating the accountability
      guarantee that the transparency log provides.
    links:
      - type: leads-to-loss
        target: L-3

  - id: H-7
    type: hazard
    title: Rekor transparency log entry spoofed
    status: approved
    description: >
      A forged Rekor transparency log entry is accepted as genuine, allowing
      an attacker to fabricate signing provenance and bypass the
      accountability controls of the transparency log.
    links:
      - type: leads-to-loss
        target: L-1
      - type: leads-to-loss
        target: L-3

  - id: H-8
    type: hazard
    title: Trust bundle modified after distribution
    status: approved
    description: >
      A trust bundle is tampered with after initial distribution, allowing an
      attacker to inject malicious root certificates or remove legitimate
      ones, subverting all subsequent verification operations.
    links:
      - type: leads-to-loss
        target: L-1
      - type: leads-to-loss
        target: L-5

  - id: H-9
    type: hazard
    title: Certificate chain validation bypassed
    status: approved
    description: >
      The certificate chain validation logic is bypassed or incomplete,
      allowing signatures from certificates not rooted in a trusted CA to be
      accepted as valid.
    links:
      - type: leads-to-loss
        target: L-1
      - type: leads-to-loss
        target: L-5

  - id: H-10
    type: hazard
    title: Resource exhaustion during parsing
    status: approved
    description: >
      A crafted input triggers unbounded memory allocation or CPU consumption
      during WebAssembly module parsing, causing denial of service and
      preventing verification of legitimate modules.
    links:
      - type: leads-to-loss
        target: L-4

  - id: H-11
    type: hazard
    title: Timing side-channel leaks key material
    status: approved
    description: >
      Non-constant-time cryptographic comparisons leak information about key
      material or signature values through timing variations, enabling
      gradual key recovery by a network or co-resident attacker.
    links:
      - type: leads-to-loss
        target: L-2

  # ---------------------------------------------------------------------------
  # System-Level Constraints
  # ---------------------------------------------------------------------------
  - id: SC-1
    type: system-constraint
    title: Reject all cryptographically invalid signatures
    status: approved
    description: >
      Signature verification MUST reject all signatures that do not
      cryptographically match the module content and the presented
      public key.
    links:
      - type: prevents
        target: H-1
      - type: protects
        target: SP-2

  - id: SC-2
    type: system-constraint
    title: Accept all valid signatures from trusted keys
    status: approved
    description: >
      Signature verification MUST accept all valid signatures produced
      by trusted keys, ensuring that legitimate modules are never
      incorrectly rejected.
    links:
      - type: prevents
        target: H-2
      - type: protects
        target: SP-6

  - id: SC-3
    type: system-constraint
    title: Zeroize key material from memory after use
    status: approved
    description: >
      Key material MUST be zeroized from memory immediately after use,
      ensuring that private keys do not persist in process memory beyond
      the signing operation.
    links:
      - type: prevents
        target: H-3
      - type: protects
        target: SP-1

  - id: SC-4
    type: system-constraint
    title: Enforce strict key file permissions
    status: approved
    description: >
      Key files MUST be stored with 0600 permissions and the permissions
      MUST be verified on every access, preventing unauthorized users or
      processes from reading key material.
    links:
      - type: prevents
        target: H-4
      - type: protects
        target: SP-1

  - id: SC-5
    type: system-constraint
    title: Enforce single-use short-lived OIDC tokens
    status: approved
    description: >
      OIDC tokens MUST be single-use with a lifetime of less than 10
      minutes and MUST be zeroized from memory after the signing
      operation completes.
    links:
      - type: prevents
        target: H-5
      - type: protects
        target: SP-8

  - id: SC-6
    type: system-constraint
    title: Verify Rekor inclusion proofs
    status: approved
    description: >
      Rekor log entries MUST be verified via inclusion proof before
      accepting keyless signatures, ensuring that every accepted
      signature has a corresponding verifiable transparency log record.
    links:
      - type: prevents
        target: H-6
      - type: protects
        target: SP-4

  - id: SC-7
    type: system-constraint
    title: Validate Rekor entries against signed checkpoints
    status: approved
    description: >
      Rekor entries MUST be validated against signed checkpoints to
      prevent acceptance of forged transparency log entries.
    links:
      - type: prevents
        target: H-7
      - type: protects
        target: SP-4

  - id: SC-8
    type: system-constraint
    title: Integrity-verify trust bundles before use
    status: approved
    description: >
      Trust bundles MUST be integrity-verified before use in any
      verification operation, ensuring that tampered bundles are
      detected and rejected.
    links:
      - type: prevents
        target: H-8
      - type: protects
        target: SP-5

  - id: SC-9
    type: system-constraint
    title: Validate full certificate chain including root CA
    status: approved
    description: >
      The full certificate chain MUST be validated including root CA
      verification, ensuring that only certificates rooted in a trusted
      authority are accepted.
    links:
      - type: prevents
        target: H-9
      - type: protects
        target: SP-3

  - id: SC-10
    type: system-constraint
    title: Enforce bounded resource consumption in parser
    status: approved
    description: >
      The parser MUST enforce bounded resource consumption with a
      maximum input size of 16 MB and bounded iteration counts,
      preventing resource exhaustion from crafted inputs.
    links:
      - type: prevents
        target: H-10
      - type: protects
        target: SP-6

  - id: SC-11
    type: system-constraint
    title: Use constant-time cryptographic comparisons
    status: approved
    description: >
      All cryptographic comparisons MUST use constant-time operations,
      preventing timing side-channel attacks that could leak key material
      or signature values.
    links:
      - type: prevents
        target: H-11
      - type: protects
        target: SP-1

  # ---------------------------------------------------------------------------
  # Round 2: New Losses
  # ---------------------------------------------------------------------------
  - id: L-6
    type: loss
    title: Loss of firmware integrity
    status: approved
    description: >
      A tampered or malicious firmware image (ELF binary or MCUboot image)
      is accepted as legitimately signed, allowing unauthorized code to
      execute on safety-critical embedded hardware (automotive ECUs,
      industrial controllers, medical devices). Unlike WASM module
      compromise where the runtime provides sandboxing, native binary
      compromise results in direct hardware access with no isolation.
    fields:
      stakeholders:
        - device-manufacturers
        - automotive-oems
        - end-users

  - id: L-7
    type: loss
    title: Loss of attestation chain continuity across WASM-to-native boundary
    status: approved
    description: >
      The attestation chain binding a WASM module to its original author,
      build environment, and signing identity is broken during synth's
      WASM-to-native transcoding. The native artifact's signature cannot
      be traced back to the original WASM module's provenance, creating a
      gap in the supply chain audit trail.
    fields:
      stakeholders:
        - security-auditors
        - compliance-officers
    links:
      - type: traces-to
        target: synth:L-6
      - type: traces-to
        target: synth:ARCH-003

  - id: L-8
    type: loss
    title: Loss of container image integrity
    status: approved
    description: >
      A tampered or malicious container image is accepted as legitimately
      signed, allowing unauthorized code to execute in container
      orchestration environments (Kubernetes, Docker). Container compromise
      is particularly impactful because containers often run with elevated
      privileges and access secrets.
    fields:
      stakeholders:
        - platform-operators
        - devops-engineers

  - id: L-9
    type: loss
    title: Loss of signature persistence in OCI registry
    status: approved
    description: >
      Legitimate container image signatures are deleted, garbage-collected,
      or made inaccessible in the OCI registry, causing verification
      failures for previously-signed images. Unlike embedded signatures,
      registry-stored signatures can be lost independently of the artifact.
    fields:
      stakeholders:
        - platform-operators
        - security-auditors

  # ---------------------------------------------------------------------------
  # Round 2: New Hazards
  # ---------------------------------------------------------------------------
  - id: H-12
    type: hazard
    title: Rekor unavailability blocks all keyless verification
    status: approved
    description: >
      The fail-closed policy (DD-2) means any Rekor service disruption
      blocks all keyless signature verification system-wide. For pipelines
      depending exclusively on keyless signing, this is a complete denial
      of service with no graceful degradation path.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-4

  - id: H-13
    type: hazard
    title: ELF parser processes malformed section headers
    status: draft
    description: >
      A malformed ELF binary with inconsistent section counts, overlapping
      sections, or circular string table references could cause the signing
      module to compute a hash over incorrect content, embed the signature
      in the wrong location, or overwrite existing sections.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-6

  - id: H-14
    type: hazard
    title: MCUboot TLV manipulation causes partial-image signature
    status: draft
    description: >
      MCUboot images use a TLV trailer for signatures. The boundary between
      signed content and TLV is determined by header fields. If an attacker
      modifies the header to declare a smaller image size, the signature
      covers only a prefix and malicious code appended after the signed
      region executes undetected.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-6

  - id: H-15
    type: hazard
    title: Transcoded native binary lacks valid signature
    status: draft
    description: >
      When synth transcodes a signed WASM module to native, the original
      WASM signature becomes invalid. If the pipeline does not re-sign the
      native artifact with attestation chain continuity, the binary is
      either unsigned or its provenance is disconnected from the source.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-7
      - type: leads-to-loss
        target: L-6
      - type: traces-to
        target: synth:ARCH-003
      - type: traces-to
        target: synth:NFR-002

  - id: H-16
    type: hazard
    title: Format confusion between signing backends
    status: draft
    description: >
      If sigil auto-detects artifact format by magic bytes or file
      extension, a crafted polyglot file could be misidentified. Applying
      the WASM signing backend to an ELF binary embeds a custom section
      the ELF loader ignores, producing a "signed" binary that is never
      actually verified.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-1
      - type: leads-to-loss
        target: L-6

  - id: H-17
    type: hazard
    title: Container tag mutation causes signature bypass
    status: draft
    description: >
      An image tag is repointed to a different digest after signing.
      Admission controllers verifying by tag may accept the old signature
      for the new content, or find no signature for the new digest.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-8

  - id: H-18
    type: hazard
    title: Registry-side signature deletion
    status: draft
    description: >
      Signature artifacts stored in OCI registries can be deleted by
      attackers with write access or misconfigured garbage collection
      policies, causing previously-signed images to appear unsigned.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-9
      - type: leads-to-loss
        target: L-8

  - id: H-19
    type: hazard
    title: Cosign dependency compromise
    status: draft
    description: >
      If sigil delegates container signing to cosign, a compromised cosign
      binary could produce forged signatures. Sigil's policy engine would
      trust cosign's output without independent verification.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-8
      - type: leads-to-loss
        target: L-5

  - id: H-20
    type: hazard
    title: Admission controller signature format mismatch
    status: draft
    description: >
      If sigil implements container signing natively instead of using
      cosign, the signature format may differ from what Kubernetes
      admission controllers expect, causing verification failures or
      bypass for unrecognized formats.
    fields:
      severity: critical
    links:
      - type: leads-to-loss
        target: L-4
      - type: leads-to-loss
        target: L-8

  # ---------------------------------------------------------------------------
  # Round 2: New System Constraints
  # ---------------------------------------------------------------------------
  - id: SC-12
    type: system-constraint
    title: Verify ELF section header consistency before signing
    status: approved
    description: >
      ELF signing MUST validate that section headers do not overlap, that
      program headers and section headers are consistent, and that the
      .signature section placement does not overwrite existing content.
    links:
      - type: prevents
        target: H-13
      - type: traces-to
        target: synth:ARCH-003

  - id: SC-13
    type: system-constraint
    title: Independently verify MCUboot image size before signing
    status: draft
    description: >
      MCUboot signing MUST independently compute image size from file
      length and reject if it disagrees with the header's ih_img_size
      field to prevent partial-image signature attacks.
    links:
      - type: prevents
        target: H-14

  - id: SC-14
    type: system-constraint
    title: Maintain attestation chain across format boundaries
    status: draft
    description: >
      When re-signing a transcoded artifact, the new signature MUST embed
      or reference the source artifact's hash, signature, and provenance
      attestation to maintain supply chain continuity.
    links:
      - type: prevents
        target: H-15
      - type: traces-to
        target: synth:FR-002
      - type: traces-to
        target: synth:VER-001

  - id: SC-15
    type: system-constraint
    title: Require explicit format specification for signing
    status: draft
    description: >
      Signing operations MUST require explicit format specification via
      CLI flag (--format wasm|elf|mcuboot|oci) and MUST NOT rely solely
      on auto-detection for security-critical operations.
    links:
      - type: prevents
        target: H-16

  - id: SC-16
    type: system-constraint
    title: Always resolve container tags to digests before signing
    status: draft
    description: >
      Container signing MUST resolve image tags to immutable digests
      before signing and bind the signature to the digest, not the tag.
    links:
      - type: prevents
        target: H-17

  - id: SC-17
    type: system-constraint
    title: Use OCI 1.1 referrers API for signature storage
    status: draft
    description: >
      Container signatures MUST be stored using the OCI 1.1 referrers
      API rather than tag-based schemes to reduce garbage collection risk.
    links:
      - type: prevents
        target: H-18

  - id: SC-18
    type: system-constraint
    title: Verify cosign binary integrity before delegation
    status: draft
    description: >
      When delegating to cosign, sigil MUST verify the cosign binary's
      integrity via checksum or signature before invoking it.
    links:
      - type: prevents
        target: H-19

  - id: SC-19
    type: system-constraint
    title: Verify signature-to-digest binding during container verification
    status: draft
    description: >
      Container signature verification MUST validate that the signature's
      internal digest claim matches the actual image digest being verified,
      preventing cross-image signature reuse attacks.
    links:
      - type: prevents
        target: H-17

  # ---------------------------------------------------------------------------
  # Round 3: v0.6.x Feature Coverage — Losses
  # ---------------------------------------------------------------------------
  - id: L-10
    type: loss
    title: Loss of WASM component model integrity
    status: draft
    description: >
      Nested module content within a WASM component is not covered by the
      outer signature, allowing an attacker to substitute or tamper with
      inner modules while the top-level signature remains valid. This
      undermines the component model's compositional trust guarantees.

  # ---------------------------------------------------------------------------
  # Round 3: v0.6.x Feature Coverage — Hazards
  # ---------------------------------------------------------------------------
  - id: H-21
    type: hazard
    title: Component section reordering invalidates signature
    status: draft
    description: >
      Reordering sections within a WASM component invalidates the signature
      even though the semantic content is unchanged, causing false
      verification failures for legitimately signed components.
    links:
      - type: leads-to-loss
        target: L-10

  - id: H-22
    type: hazard
    title: Nested module substitution in signed component
    status: draft
    description: >
      An attacker substitutes a nested module within a signed WASM component
      without invalidating the outer signature, because the signature does
      not cover the full component tree recursively.
    links:
      - type: leads-to-loss
        target: L-10

  - id: H-23
    type: hazard
    title: PQC hybrid verification skips post-quantum component
    status: draft
    description: >
      Hybrid signature verification accepts the classical (Ed25519) component
      alone without verifying the post-quantum (ML-DSA) component, leaving
      the system vulnerable to quantum-capable adversaries.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-24
    type: hazard
    title: PQC key material too large for embedded flash
    status: draft
    description: >
      Post-quantum key material exceeds the available flash storage on
      constrained embedded devices, causing key truncation or storage
      failures that prevent successful verification.
    links:
      - type: leads-to-loss
        target: L-6

  - id: H-25
    type: hazard
    title: Proof cache poisoning accepts revoked entries
    status: draft
    description: >
      An attacker poisons the proof cache with entries that reference
      revoked or invalid transparency log proofs, causing subsequent
      verifications to accept stale or revoked signatures from cache.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-26
    type: hazard
    title: Cache TTL too long allows stale proofs after revocation
    status: draft
    description: >
      The proof cache time-to-live is set too long, allowing cached proofs
      to remain valid after the underlying certificate or key has been
      revoked, creating a window of vulnerability.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-27
    type: hazard
    title: SCT verification accepts forged CT log signature
    status: draft
    description: >
      Signed Certificate Timestamp verification accepts a forged CT log
      signature because the verification does not properly validate the
      log's signing key against a trusted key set.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-28
    type: hazard
    title: SCT monitoring fails silently
    status: draft
    description: >
      SCT monitoring encounters errors (network failures, malformed
      responses) but fails open, allowing certificates without valid SCTs
      to be accepted without alerting operators.
    links:
      - type: leads-to-loss
        target: L-3

  - id: H-29
    type: hazard
    title: Checkpoint store corruption accepts split-view log
    status: draft
    description: >
      The checkpoint store is corrupted or tampered with, causing the
      verifier to accept a split-view transparency log where different
      clients see different log contents.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-30
    type: hazard
    title: Checkpoint race condition leaves stale state
    status: draft
    description: >
      Concurrent checkpoint updates create a race condition where a stale
      checkpoint overwrites a newer one, allowing the verifier to accept
      log entries that have been superseded or revoked.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-31
    type: hazard
    title: Sigstore bundle format mismatch breaks cosign verify
    status: draft
    description: >
      The Sigstore bundle produced by sigil uses a format or media type
      that cosign or other verifiers do not recognize, causing
      interoperability failures and verification rejection.
    links:
      - type: leads-to-loss
        target: L-4

  - id: H-32
    type: hazard
    title: Bundle missing mandatory fields accepted as valid
    status: draft
    description: >
      A Sigstore bundle with missing mandatory fields (verification
      material, message signature, or log entries) is accepted as valid,
      allowing incomplete or forged bundles to pass verification.
    links:
      - type: leads-to-loss
        target: L-2

  - id: H-33
    type: hazard
    title: Build environment metadata spoofed via env vars
    status: draft
    description: >
      Build environment attestation metadata is captured from environment
      variables that an attacker can control, allowing spoofed build
      provenance to be embedded in signatures.
    links:
      - type: leads-to-loss
        target: L-3

  - id: H-34
    type: hazard
    title: Build environment capture executes attacker-controlled binaries
    status: draft
    description: >
      Build environment capture invokes tool binaries discovered via PATH,
      allowing an attacker who controls PATH to execute arbitrary code
      during the signing process.
    links:
      - type: leads-to-loss
        target: L-5

  - id: H-35
    type: hazard
    title: DSSE verify() accepts single valid sig hiding compromised key
    status: draft
    description: >
      DSSE multi-signature verification accepts a payload when any single
      signature is valid, allowing an attacker with one compromised key to
      bypass a multi-party signing policy.
    links:
      - type: leads-to-loss
        target: L-3

  # ---------------------------------------------------------------------------
  # Round 3: v0.6.x Feature Coverage — System Constraints
  # ---------------------------------------------------------------------------
  - id: SC-20
    type: system-constraint
    title: Signature MUST cover full component tree including nested modules
    status: draft
    description: >
      Signature computation MUST cover the full component tree including
      all nested modules, ensuring that substitution of any inner module
      invalidates the outer signature.
    links:
      - type: prevents
        target: H-22
      - type: protects
        target: SP-2

  - id: SC-21
    type: system-constraint
    title: Parser MUST recursively traverse component nesting
    status: draft
    description: >
      The component parser MUST recursively traverse all levels of
      component nesting to produce a canonical byte sequence for signing,
      preventing section reordering attacks.
    links:
      - type: prevents
        target: H-21
      - type: protects
        target: SP-2

  - id: SC-22
    type: system-constraint
    title: Hybrid verification MUST check both classical and PQC signatures
    status: draft
    description: >
      Hybrid signature verification MUST independently verify both the
      classical and post-quantum signature components, rejecting the
      bundle if either component fails.
    links:
      - type: prevents
        target: H-23
      - type: protects
        target: SP-1

  - id: SC-23
    type: system-constraint
    title: PQC key material MUST be zeroized on drop
    status: draft
    description: >
      Post-quantum key material MUST be zeroized from memory on drop,
      using the same zeroize-on-drop guarantees applied to classical
      key material.
    links:
      - type: prevents
        target: H-24
      - type: protects
        target: SP-3

  - id: SC-24
    type: system-constraint
    title: Cache MUST only store proofs verified cryptographically
    status: draft
    description: >
      The proof cache MUST only store entries whose cryptographic proofs
      have been independently verified, preventing cache poisoning with
      invalid or revoked entries.
    links:
      - type: prevents
        target: H-25
      - type: protects
        target: SP-6

  - id: SC-25
    type: system-constraint
    title: Cache MUST be bounded in size
    status: draft
    description: >
      The proof cache MUST enforce a maximum entry count and total size
      bound, evicting oldest entries first, to prevent unbounded growth
      and resource exhaustion.
    links:
      - type: prevents
        target: H-25
      - type: protects
        target: SP-8

  - id: SC-26
    type: system-constraint
    title: SCT signatures MUST be verified against trusted CT log keys
    status: draft
    description: >
      Signed Certificate Timestamp signatures MUST be verified against
      a trusted set of CT log public keys, rejecting SCTs signed by
      unknown or untrusted logs.
    links:
      - type: prevents
        target: H-27
      - type: protects
        target: SP-6

  - id: SC-27
    type: system-constraint
    title: SCT monitoring MUST fail-closed when no valid SCTs found
    status: draft
    description: >
      SCT monitoring MUST fail-closed, rejecting certificates when no
      valid SCTs can be obtained or verified, rather than silently
      accepting unmonitored certificates.
    links:
      - type: prevents
        target: H-28
      - type: protects
        target: SP-6

  - id: SC-28
    type: system-constraint
    title: Checkpoint store MUST be atomically updated
    status: draft
    description: >
      Checkpoint store updates MUST be atomic (write-then-rename),
      ensuring that a crash or concurrent access never leaves the
      store in a corrupt or partially-written state.
    links:
      - type: prevents
        target: H-29
      - type: protects
        target: SP-6

  - id: SC-29
    type: system-constraint
    title: Checkpoint MUST persist across process restarts
    status: draft
    description: >
      The latest verified checkpoint MUST be persisted to durable
      storage and loaded on process restart, preventing rollback to
      an earlier log state.
    links:
      - type: prevents
        target: H-30
      - type: protects
        target: SP-6

  - id: SC-30
    type: system-constraint
    title: Bundle MUST include complete verification material
    status: draft
    description: >
      Sigstore bundles MUST include all mandatory verification material
      (certificate chain, transparency log entry, timestamps) and MUST
      be rejected if any required field is absent.
    links:
      - type: prevents
        target: H-32
      - type: protects
        target: SP-6

  - id: SC-31
    type: system-constraint
    title: Bundle media type MUST be validated before parsing
    status: draft
    description: >
      The Sigstore bundle media type MUST be validated against the
      expected value before parsing, ensuring interoperability with
      cosign and other Sigstore verifiers.
    links:
      - type: prevents
        target: H-31
      - type: protects
        target: SP-2

  - id: SC-32
    type: system-constraint
    title: Build env capture MUST NOT trust user-supplied PATH
    status: draft
    description: >
      Build environment capture MUST use hardcoded absolute paths for
      tool invocation and MUST NOT rely on the user-supplied PATH
      environment variable, preventing PATH injection attacks.
    links:
      - type: prevents
        target: H-34
      - type: protects
        target: SP-3

  - id: SC-33
    type: system-constraint
    title: DSSE multi-sig verification policy MUST be configurable
    status: draft
    description: >
      DSSE multi-signature verification MUST support configurable
      threshold policies (e.g., k-of-n), defaulting to requiring all
      signatures to be valid, preventing single-key compromise from
      bypassing multi-party signing requirements.
    links:
      - type: prevents
        target: H-35
      - type: protects
        target: SP-6
