  - id: AS-11
    type: attack-scenario
    title: Unverified Module Loading
    status: approved
    description: >
      Runtime loads WASM module without invoking signature verification,
      bypassing all integrity controls. Could occur when verification is
      optional or when a code path skips the verification step.
    fields:
      attack-type: exploit-vulnerability
      attack-feasibility: medium
