  - id: AS-9
    type: attack-scenario
    title: Stale Trust Bundle Cache Attack
    status: approved
    description: >
      Verification module caches trust bundle in memory; after bundle is
      updated (e.g., key revocation), verifier continues using stale
      cached copy, accepting signatures from revoked keys.
    fields:
      attack-type: replay-attack
      attack-feasibility: low
      elapsed-time: 4
