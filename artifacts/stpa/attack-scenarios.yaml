  - id: AS-35
    type: attack-scenario
    title: PATH injection during build environment attestation
    status: draft
    description: >
      Supply chain attacker places a trojanized `rustc` binary in a
      directory prepended to PATH. BuildEnvironment::capture() executes
      `Command::new("rustc")` which resolves to the attacker's binary.
      The trojanized binary reports a legitimate version string but also
      exfiltrates signing key material or injects a backdoor. The
      attestation metadata records the spoofed version, hiding the attack.
