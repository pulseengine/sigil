    type: attack-scenario
    title: DSSE policy bypass via single compromised key
    status: draft
    description: >
      Attacker compromises one of N signing keys in a multi-party signing
      setup. Because DSSE verification accepts any single valid signature
      regardless of the configured threshold policy, the attacker can sign
      and verify payloads unilaterally, bypassing the k-of-n requirement.
