  - id: AS-34
    type: attack-scenario
    title: Cache flooding via unique module hashes
    status: draft
    description: >
      Attacker submits a large number of verification requests with unique
      module hashes (trivially generated by appending random custom sections).
      Each request creates a new MemoryProofCache entry. Without a maximum
      entry count, memory grows until OOM kills the verification service.
