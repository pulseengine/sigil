  - id: AS-6
    type: attack-scenario
    title: Silent Rekor Skip on Network Failure
    status: approved
    description: >
      Attacker causes network failure during keyless verification; if
      verification module fails-open instead of fail-closed, signatures
      are accepted without Rekor proof.
