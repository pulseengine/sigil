  - id: AS-23
    type: attack-scenario
    title: Quantum downgrade -- strip PQC from hybrid sig
    status: draft
    description: >
      Attacker strips the post-quantum (ML-DSA) component from a hybrid
      signature, leaving only the classical Ed25519 component. If the
      verifier does not require the PQC component, the downgraded
      signature passes verification and the system loses quantum
      resistance.
    fields:
      attack-type: exploit-vulnerability
      attack-feasibility: low
      impact-safety: moderate
      impact-financial: major
      impact-operational: major
      impact-privacy: none
    links:
      - type: exploits
        target: UCA-24
      - type: executed-by
        target: TA-1
      - type: leads-to-hazard
        target: H-23

  - id: AS-24
    type: attack-scenario
    title: Cache pre-population with verified-then-revoked proof
    status: draft
    description: >
      Insider obtains a legitimately signed and verified proof, waits for
      the signing key to be revoked, then exploits the cache TTL window.
      The cached proof continues to return success for the revoked key
      until the cache entry expires.
    fields:
      attack-type: replay-attack
      attack-feasibility: low
      impact-safety: moderate
      impact-financial: major
      impact-operational: major
      impact-privacy: none
    links:
      - type: exploits
        target: UCA-27
      - type: executed-by
        target: TA-2
      - type: leads-to-hazard
        target: H-26

  - id: AS-25
    type: attack-scenario
    title: Cache memory exhaustion via unique hashes
    status: draft
    description: >
      Attacker submits a large number of verification requests with unique
      module hashes, causing the proof cache to grow without bound. Without
      cache size limits, this exhausts available memory and causes denial
      of service for the verification service.
    fields:
      attack-type: denial-of-service
      attack-feasibility: medium
      impact-safety: none
      impact-financial: negligible
      impact-operational: moderate
      impact-privacy: none
    links:
