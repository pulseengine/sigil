    type: attack-scenario
    title: CT log key compromise enables undetected mis-issuance
    status: draft
    description: >
      Attacker compromises a CT log signing key and forges SCTs for
      mis-issued Fulcio certificates. Because the SCT monitor verifies
      against the wrong (compromised) key, the forged SCTs pass
      validation and the mis-issued certificates appear monitored.
    fields:
      attack-type: credential-theft
      attack-feasibility: very-low
      impact-safety: severe
      impact-financial: severe
      impact-operational: severe
      impact-privacy: none
    links:
