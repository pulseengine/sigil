  - id: AS-12
    type: attack-scenario
    title: OIDC Provider Misconfiguration in CI
    status: approved
    description: >
      CI pipeline configured with wrong OIDC issuer URL, causing signing
      workflow to obtain certificates from an unintended identity provider.
      Attacker registers matching identity on the wrong provider to sign
      modules under a false identity.
    fields:
      attack-type: social-engineering
      attack-feasibility: low
      impact-safety: moderate
      impact-financial: major
      impact-operational: major
      impact-privacy: none
