  - id: AS-22
    type: attack-scenario
    title: Nested module substitution in WASM component
    status: draft
    description: >
      Attacker replaces a nested module within a signed WASM component
      with a malicious version. Because the signing process does not
      traverse nested modules, the outer signature remains valid and the
      modified component passes verification.
    fields:
      attack-type: supply-chain-compromise
      attack-feasibility: low
      impact-safety: severe
      impact-financial: severe
      impact-operational: severe
      impact-privacy: none
