  - id: AS-14
    type: attack-scenario
    title: ELF section injection via crafted binary
    status: draft
    description: >
      Supply chain attacker provides a crafted ELF binary where section
      headers declare overlapping regions. The signing module hashes the
      section-header view, but the program-header view (what actually
      executes) contains malicious code. Signature is valid over sections
      but program headers load different bytes.
    fields:
      attack-type: supply-chain-compromise
      attack-feasibility: very-low
      impact-safety: severe
      impact-financial: severe
      impact-operational: severe
      impact-privacy: none
