  - id: AS-1
    type: attack-scenario
    title: Key Theft via File System Access
    status: approved
    description: >
      Attacker with local access reads secret key file from
      ~/.wsc/keys/*.sec due to insufficient permission checks.
    fields:
      attack-type: credential-theft
      attack-feasibility: low
      elapsed-time: 4
      specialist-expertise: 3
      knowledge-of-item: 3
      window-of-opportunity: 4
      equipment: 0
      impact-safety: moderate
      impact-financial: major
      impact-operational: moderate
      impact-privacy: negligible
