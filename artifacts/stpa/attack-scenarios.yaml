    title: MCUboot header size manipulation for partial-image signature
    status: draft
    description: >
      Attacker modifies MCUboot image header ih_img_size to a value
      smaller than actual payload before signing. Signing module trusts
      the header and signs only the declared prefix. Malicious code
      appended after the signed region executes on the target device.
    fields:
      attack-type: supply-chain-compromise
      attack-feasibility: low
      impact-safety: severe
      impact-financial: severe
      impact-operational: severe
