  - id: AS-36
    type: attack-scenario
    title: MCUboot partial-image signature via small ih_img_size
    status: draft
    description: >
      Attacker crafts an MCUboot image where ih_img_size is set to 256
      bytes (covering only the initialization code) while the actual
      payload is 64KB. The parser accepts this because 256 + header <=
      file.len(). The signing module hashes only the first 256 bytes of
      payload. Malicious code in bytes 257-65536 executes on the target
      MCU unverified. The bootloader loads the full image but only the
      prefix was signed.
