        target: UCA-29
      - type: executed-by
        target: TA-1
      - type: leads-to-hazard
        target: H-28

  - id: AS-27
    type: attack-scenario
    title: SCT stripping from Fulcio certificate
    status: draft
    description: >
      Insider with access to the signing pipeline strips the embedded SCT
      extension from a Fulcio certificate before it is stored in the
      Sigstore bundle. If the SCT monitor does not require SCTs, the
      certificate is accepted without CT monitoring.
    fields:
      attack-type: exploit-vulnerability
      attack-feasibility: low
      impact-safety: moderate
