        target: UCA-20
      - type: executed-by
        target: TA-3
      - type: executed-by
        target: TA-4
      - type: leads-to-hazard
        target: H-19

  - id: AS-21
    type: attack-scenario
    title: Cross-image signature reuse (portability attack)
    status: draft
    description: >
      Attacker copies OCI signature artifact from a legitimately signed
      image and attaches it to a malicious image in the same registry.
      If verification checks only signature existence without digest
      binding, the malicious image passes verification.
    fields:
      attack-type: replay-attack
      attack-feasibility: low
      impact-safety: severe
      impact-financial: severe
      impact-operational: severe
      impact-privacy: none
    links:
