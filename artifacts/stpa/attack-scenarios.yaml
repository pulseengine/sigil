    title: Checkpoint file replacement with stale state
    status: draft
    description: >
      Insider replaces the persisted checkpoint file with an older
      checkpoint. Without a consistency proof requirement, the verifier
      accepts the stale checkpoint and cannot detect log entries that
      were added after the replaced checkpoint.
    fields:
      attack-type: replay-attack
