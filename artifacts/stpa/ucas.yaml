artifacts:
  # ──────────────────────────────────────────────
  # Threat Agents
  # ──────────────────────────────────────────────

  - id: TA-1
    type: threat-agent
    title: Script Kiddie
    status: approved
    description: >
      Opportunistic external attacker with proficient technical capability,
      motivated by disruption, operating remotely with unlimited time to
      attempt attacks against publicly exposed signing and verification
      interfaces.
    fields:
      agent-type: external-attacker
      capability: proficient
      motivation: disruption
      access: remote
      window-of-opportunity: unlimited

  - id: TA-2
    type: threat-agent
    title: Malicious Insider
    status: approved
    description: >
      Insider with expert-level capability and local access to signing
      infrastructure, motivated by financial gain, with easy opportunity
      to exploit trusted access to key material and signing pipelines.
    fields:
      agent-type: insider
      capability: expert
      motivation: financial
      access: local
      window-of-opportunity: easy

  - id: TA-3
    type: threat-agent
    title: Supply Chain Attacker
    status: approved
    description: >
      Expert-level attacker targeting the software supply chain, motivated
      by espionage, with adjacent access to build systems, dependency
      registries, or distribution channels and moderate opportunity windows.
    fields:
      agent-type: supply-chain
      capability: expert
      motivation: espionage
      access: adjacent
      window-of-opportunity: moderate

  - id: TA-4
    type: threat-agent
    title: State-Level Actor
    status: approved
    description: >
      State-sponsored threat group with multiple expert-level operatives,
      motivated by espionage, operating remotely with unlimited resources
      and time to compromise cryptographic signing infrastructure.
    fields:
      agent-type: state-level
      capability: multiple-experts
      motivation: espionage
      access: remote
      window-of-opportunity: unlimited

  - id: TA-5
    type: threat-agent
    title: Compromised CI Runner
    status: approved
    description: >
      Automated CI runner environment that has been compromised, operating
      with proficient capability and local access to signing credentials
      and OIDC tokens, with easy opportunity to exfiltrate secrets during
      build execution.
    fields:
      agent-type: automated
      capability: proficient
      motivation: accidental
      access: local
      window-of-opportunity: easy

  # ──────────────────────────────────────────────
  # Unsecure Control Actions (UCAs)
  # ──────────────────────────────────────────────

  - id: UCA-1
    type: uca
    title: Verify signature NOT PROVIDED when module loaded
    status: approved
    description: >
      Verification module does not verify signature before module is
      accepted, allowing an unsigned or tampered module to pass through
      the loading pipeline without any integrity check.
    fields:
      uca-type: not-providing
      context: "Module loaded into runtime without signature check"
    links:
      - type: issued-by
        target: CTRL-4
      - type: leads-to-hazard
        target: H-1

  - id: UCA-2
    type: uca
    title: Verify signature PROVIDED with wrong public key
    status: approved
    description: >
      Verification uses incorrect or outdated key from trust bundle,
      causing the verifier to accept signatures from an untrusted key
      or reject signatures from the correct key.
    fields:
      uca-type: providing
      context: "Trust bundle updated but verifier uses cached old key"
    links:
      - type: issued-by
        target: CTRL-4
      - type: leads-to-hazard
        target: H-1
      - type: leads-to-hazard
        target: H-8

  - id: UCA-3
    type: uca
    title: Zeroize key NOT PROVIDED after signing
    status: approved
    description: >
      Signing module does not clear key material from memory after
      operation completes, leaving private key data accessible in
      process memory for potential extraction.
    fields:
      uca-type: not-providing
      context: "Key remains in process memory after signing completes"
    links:
      - type: issued-by
        target: CTRL-2
      - type: leads-to-hazard
        target: H-3

  - id: UCA-4
    type: uca
    title: Zeroize key PROVIDED TOO LATE
    status: approved
    description: >
      Key material persists in memory during window between signing
      completion and zeroization, allowing extraction by a co-resident
      attacker or through memory dump during the delay.
    fields:
      uca-type: too-early-too-late
      context: "Delay between signing completion and memory wipe allows extraction"
    links:
      - type: issued-by
        target: CTRL-2
      - type: leads-to-hazard
        target: H-3
      - type: leads-to-hazard
        target: H-11

  - id: UCA-5
    type: uca
    title: Verify Rekor proof NOT PROVIDED
    status: approved
    description: >
      Keyless signature accepted without verifying Rekor inclusion proof,
      eliminating the transparency guarantee and allowing signatures that
      were never publicly logged to be treated as valid.
    fields:
      uca-type: not-providing
      context: "Network failure causes Rekor check to be silently skipped"
    links:
      - type: issued-by
        target: CTRL-4
      - type: leads-to-hazard
        target: H-6

  - id: UCA-6
    type: uca
    title: Validate certificate chain NOT PROVIDED
    status: approved
    description: >
      Certificate chain validation skipped or incomplete during keyless
      verification, allowing signatures from certificates not rooted in
      a trusted CA to be accepted.
    fields:
      uca-type: not-providing
      context: "Intermediate CA validation omitted"
    links:
      - type: issued-by
        target: CTRL-6
      - type: leads-to-hazard
        target: H-9

  - id: UCA-7
    type: uca
    title: Load trust bundle PROVIDED with tampered bundle
    status: approved
    description: >
      Trust bundle manager loads a modified bundle without integrity
      verification, allowing an attacker to inject malicious root
      certificates or remove legitimate ones.
    fields:
      uca-type: providing
      context: "Bundle file modified on disk, loaded without hash check"
    links:
      - type: issued-by
        target: CTRL-5
      - type: leads-to-hazard
        target: H-8

  - id: UCA-8
    type: uca
    title: Request Fulcio certificate PROVIDED with stolen OIDC token
    status: approved
    description: >
      Keyless module uses a replayed or stolen identity token to obtain
      a signing certificate for an identity the attacker does not
      control.
    fields:
      uca-type: providing
      context: "CI runner environment compromised, token exfiltrated and reused"
    links:
      - type: issued-by
        target: CTRL-3
      - type: leads-to-hazard
        target: H-5

  - id: UCA-9
    type: uca
    title: Sign module PROVIDED when key file has wrong permissions
    status: approved
    description: >
      Signing proceeds despite key file having world-readable permissions,
      indicating the key may already be compromised and any signatures
      produced cannot be trusted.
    fields:
      uca-type: providing
      context: "Key file permissions not checked before loading"
    links:
      - type: issued-by
        target: CTRL-2
      - type: leads-to-hazard
        target: H-4

  - id: UCA-10
    type: uca
    title: Parse module input APPLIED TOO LONG
    status: approved
    description: >
      Parser does not enforce resource bounds on malicious input, allowing
      crafted WASM modules to trigger unbounded memory allocation or CPU
      consumption.
    fields:
      uca-type: stopped-too-soon
      context: "Oversized or deeply nested WASM module causes unbounded allocation"
    links:
      - type: issued-by
        target: CTRL-1
      - type: leads-to-hazard
        target: H-10

  - id: UCA-11
    type: uca
    title: Verify Rekor checkpoint PROVIDED with spoofed checkpoint
    status: approved
    description: >
      Rekor verification uses unsigned or attacker-controlled checkpoint,
      allowing fabricated transparency log entries to be accepted as
      genuine.
    fields:
      uca-type: providing
      context: "Checkpoint signature not verified against known Rekor public key"
    links:
      - type: issued-by
        target: CTRL-4
      - type: leads-to-hazard
        target: H-7

  - id: UCA-12
    type: uca
    title: Invoke signing workflow NOT PROVIDED with identity verification
    status: approved
    description: >
      CI pipeline triggers signing without verifying its own OIDC provider
      configuration, allowing tokens from unintended identity providers to
      be used for signing operations.
    fields:
      uca-type: not-providing
      context: "Pipeline configured with wrong OIDC issuer, accepts tokens from unintended provider"
    links:
      - type: issued-by
        target: CTRL-7
      - type: leads-to-hazard
        target: H-5

  # ──────────────────────────────────────────────
  # Controller Constraints
  # ──────────────────────────────────────────────

  - id: CC-1
    type: controller-constraint
    title: Verification module MUST verify signature before accepting any module
    status: approved
    description: >
      The verification module must always perform signature verification
      before returning a positive verification result.
    fields:
      constraint: "The verification module must always perform signature verification before returning a positive verification result"
    links:
      - type: constrains-controller
        target: CTRL-4
      - type: inverts-uca
        target: UCA-1
      - type: prevents
        target: H-1

  - id: CC-2
    type: controller-constraint
    title: Verification module MUST use current trust bundle keys, never cached copies
    status: approved
    description: >
      The verification module must reload the trust bundle on each
      verification, never use stale cached key material.
    fields:
      constraint: "The verification module must reload the trust bundle on each verification, never use stale cached key material"
    links:
      - type: constrains-controller
        target: CTRL-4
      - type: inverts-uca
        target: UCA-2
      - type: prevents
        target: H-1
      - type: prevents
        target: H-8

  - id: CC-3
    type: controller-constraint
    title: Signing module MUST zeroize all key material immediately upon completion
    status: approved
    description: >
      Key material must be zeroized via the zeroize crate Drop
      implementation, ensuring cleanup even on panic.
    fields:
      constraint: "Key material must be zeroized via the zeroize crate Drop implementation, ensuring cleanup even on panic"
    links:
      - type: constrains-controller
        target: CTRL-2
      - type: inverts-uca
        target: UCA-3
      - type: prevents
        target: H-3

  - id: CC-4
    type: controller-constraint
    title: Signing module MUST minimize key material lifetime in memory
    status: approved
    description: >
      Key material must be loaded just-in-time and zeroized immediately
      after the signing operation, with no unnecessary copies.
    fields:
      constraint: "Key material must be loaded just-in-time and zeroized immediately after the signing operation, with no unnecessary copies"
    links:
      - type: constrains-controller
        target: CTRL-2
      - type: inverts-uca
        target: UCA-4
      - type: prevents
        target: H-3
      - type: prevents
        target: H-11

  - id: CC-5
    type: controller-constraint
    title: Verification module MUST fail-closed when Rekor is unreachable
    status: approved
    description: >
      Keyless signature verification must reject signatures when Rekor
      inclusion proof cannot be obtained, never silently skip the check.
    fields:
      constraint: "Keyless signature verification must reject signatures when Rekor inclusion proof cannot be obtained, never silently skip the check"
    links:
      - type: constrains-controller
        target: CTRL-4
      - type: inverts-uca
        target: UCA-5
      - type: prevents
        target: H-6

  - id: CC-6
    type: controller-constraint
    title: Certificate validator MUST verify full chain including all intermediates
    status: approved
    description: >
      Certificate chain validation must verify every certificate from
      leaf to root, rejecting chains with missing or invalid intermediates.
    fields:
      constraint: "Certificate chain validation must verify every certificate from leaf to root, rejecting chains with missing or invalid intermediates"
    links:
      - type: constrains-controller
        target: CTRL-6
      - type: inverts-uca
        target: UCA-6
      - type: prevents
        target: H-9

  - id: CC-7
    type: controller-constraint
    title: Trust bundle manager MUST verify bundle integrity before loading
    status: approved
    description: >
      Trust bundles must be integrity-checked (hash verification) before
      their contents are used for signature verification.
    fields:
      constraint: "Trust bundles must be integrity-checked (hash verification) before their contents are used for signature verification"
    links:
      - type: constrains-controller
        target: CTRL-5
      - type: inverts-uca
        target: UCA-7
      - type: prevents
        target: H-8

  - id: CC-8
    type: controller-constraint
    title: Keyless module MUST validate OIDC token freshness and single-use
    status: approved
    description: >
      OIDC tokens must be validated for expiry (<10 min lifetime),
      audience, and issuer before use, and zeroized immediately after.
    fields:
      constraint: "OIDC tokens must be validated for expiry (<10 min lifetime), audience, and issuer before use, and zeroized immediately after"
    links:
      - type: constrains-controller
        target: CTRL-3
      - type: inverts-uca
        target: UCA-8
      - type: prevents
        target: H-5

  - id: CC-9
    type: controller-constraint
    title: Signing module MUST verify key file permissions before loading
    status: approved
    description: >
      Secret key files must be checked for 0600 permissions before
      loading; signing must abort if permissions are too permissive.
    fields:
      constraint: "Secret key files must be checked for 0600 permissions before loading; signing must abort if permissions are too permissive"
    links:
      - type: constrains-controller
        target: CTRL-2
      - type: inverts-uca
        target: UCA-9
      - type: prevents
        target: H-4

  - id: CC-10
    type: controller-constraint
    title: CLI MUST enforce resource bounds on all input parsing
    status: approved
    description: >
      Parser must enforce 16MB maximum allocation, bounded iteration,
      and maximum section counts for all WASM input.
    fields:
      constraint: "Parser must enforce 16MB maximum allocation, bounded iteration, and maximum section counts for all WASM input"
    links:
      - type: constrains-controller
        target: CTRL-1
      - type: inverts-uca
        target: UCA-10
      - type: prevents
        target: H-10

  - id: CC-11
    type: controller-constraint
    title: Verification module MUST verify Rekor checkpoint signatures
    status: approved
    description: >
      Rekor signed tree heads must be verified against the known Rekor
      public key before trusting any inclusion proof.
    fields:
      constraint: "Rekor signed tree heads must be verified against the known Rekor public key before trusting any inclusion proof"
    links:
      - type: constrains-controller
        target: CTRL-4
      - type: inverts-uca
        target: UCA-11
      - type: prevents
        target: H-7

  - id: CC-12
    type: controller-constraint
    title: CI pipeline MUST verify OIDC provider configuration
    status: approved
    description: >
      Pipeline signing workflows must validate OIDC issuer URL matches
      expected provider before requesting identity tokens.
    fields:
      constraint: "Pipeline signing workflows must validate OIDC issuer URL matches expected provider before requesting identity tokens"
    links:
      - type: constrains-controller
        target: CTRL-7
      - type: inverts-uca
        target: UCA-12
      - type: prevents
        target: H-5

  # ──────────────────────────────────────────────────
  # Round 2: New UCAs
  # ──────────────────────────────────────────────────

  - id: UCA-13
    type: uca
    title: Sign ELF binary WITHOUT section overlap validation
    status: draft
    description: >
      ELF Signing Module signs a binary without verifying that the
      .signature section does not overlap with existing sections (.text,
      .data, .rodata). Could overwrite executable code or read-only data.
    fields:
      uca-type: not-providing
      context: >
        ELF binary with densely packed sections near end of file
      rationale: >
        Section overlap could corrupt the signed binary, producing
        incorrect execution or crashes on safety-critical hardware.
    links:
      - type: issued-by
        target: CTRL-8
      - type: leads-to-hazard
        target: H-13

  - id: UCA-14
    type: uca
    title: Sign MCUboot image WITHOUT verifying image size header
    status: draft
    description: >
      MCUboot Signing Module signs using the declared ih_img_size without
      independently verifying it matches actual file content. An attacker
      can declare a smaller size so the signature covers only a prefix.
    fields:
      uca-type: providing
      context: >
        MCUboot header declares image_size smaller than actual file
      rationale: >
        Partial-image signature allows malicious code appended after
        the signed region to execute without detection.
    links:
      - type: issued-by
        target: CTRL-9
      - type: leads-to-hazard
        target: H-14

  - id: UCA-15
    type: uca
    title: Re-sign transcoded artifact WITHOUT source attestation link
    status: draft
    description: >
      After synth transcodes WASM to native, the signing module signs the
      native artifact without embedding or referencing the original WASM
      module's signature, hash, or provenance attestation.
    fields:
      uca-type: not-providing
      context: >
        synth transcodes WASM to ELF, new signature has no reference to
        original WASM hash
      rationale: >
        The native artifact's signature is an orphan with no link to its
        source, breaking the supply chain audit trail.
    links:
      - type: issued-by
        target: CTRL-8
      - type: leads-to-hazard
        target: H-15

  - id: UCA-16
    type: uca
    title: Format detection PROVIDED incorrectly for polyglot files
    status: draft
    description: >
      CLI Controller auto-detects artifact format and dispatches to the
      wrong signing backend. A polyglot file or misleading extension
      causes the wrong module to be invoked.
    fields:
      uca-type: providing
      context: >
        File with .wasm extension is actually an ELF binary, or vice versa
      rationale: >
        Wrong backend produces a signature the target format's loader
        ignores, creating a falsely "signed" but unverified artifact.
    links:
      - type: issued-by
        target: CTRL-1
      - type: leads-to-hazard
        target: H-16

  - id: UCA-17
    type: uca
    title: Parse ELF/MCUboot input without resource bounds
    status: draft
    description: >
      ELF or MCUboot signing module processes input without enforcing
      size limits, section count limits, or string table bounds, unlike
      WASM which has SC-10's 16MB limit.
    fields:
      uca-type: stopped-too-soon
      context: >
        ELF with 65535 section headers triggers excessive memory allocation
      rationale: >
        Native binary formats can be much larger than WASM modules and
        have more complex structures for resource exhaustion attacks.
    links:
      - type: issued-by
        target: CTRL-8
      - type: leads-to-hazard
        target: H-13

  - id: UCA-18
    type: uca
    title: Sign container image with tag reference instead of digest
    status: draft
    description: >
      Container Signing Module signs an image referenced by mutable tag
      rather than immutable digest. The signature binds to whatever digest
      the tag points to at signing time, creating a TOCTOU vulnerability.
    fields:
      uca-type: providing
      context: >
        User runs sigil sign --container myapp:latest instead of
        myapp@sha256:abc
      rationale: >
        Tag can be repointed after signing, causing the signed digest
        and deployed digest to diverge.
    links:
      - type: issued-by
        target: CTRL-10
      - type: leads-to-hazard
        target: H-17

  - id: UCA-19
    type: uca
    title: Container verification NOT PROVIDED when signature missing
    status: draft
    description: >
      Verification module queries OCI registry for signature artifact,
      receives 404, and treats it as "unsigned" rather than "verification
      failed." If deployment policy allows unsigned images, the image
      is deployed without verification.
    fields:
      uca-type: not-providing
      context: >
        Signature artifact garbage-collected or deleted from registry
      rationale: >
        Missing signature should be treated as verification failure,
        not as absence of requirement.
    links:
      - type: issued-by
        target: CTRL-10
      - type: leads-to-hazard
        target: H-18

  - id: UCA-20
    type: uca
    title: Delegate to cosign WITHOUT integrity verification
    status: draft
    description: >
      Container Signing Module invokes cosign as subprocess without
      verifying cosign binary authenticity. An attacker who replaces
      the cosign binary intercepts all signing operations.
    fields:
      uca-type: not-providing
      context: >
        cosign binary in PATH replaced with trojanized version
      rationale: >
        Delegating to an unverified external tool undermines the
        entire signing infrastructure.
    links:
      - type: issued-by
        target: CTRL-10
      - type: leads-to-hazard
        target: H-19

  - id: UCA-21
    type: uca
    title: Verify container signature WITHOUT checking digest binding
    status: draft
    description: >
      Verification module checks signature validity but not that the
      signature's embedded digest matches the actual image digest.
      An attacker could attach a valid signature from a different image.
    fields:
      uca-type: providing
      context: >
        Signature from image A copied and attached to image B in registry
      rationale: >
        Valid signature existence check without digest binding allows
        cross-image signature reuse attacks.
    links:
      - type: issued-by
        target: CTRL-10
      - type: leads-to-hazard
        target: H-17

  # ──────────────────────────────────────────────────
  # Round 3: v0.6.x Feature Coverage — UCAs
  # ──────────────────────────────────────────────────

  - id: UCA-22
    type: uca
    title: Sign component WITHOUT traversing nested modules
    status: draft
    description: >
      Component Model Parser signs a WASM component without recursively
      traversing nested modules. The outer signature covers only top-level
      sections, allowing an attacker to substitute inner modules without
      invalidating the signature.
    fields:
      uca-type: providing
      context: >
        WASM component with nested modules signed using flat section hash
      rationale: >
        Nested module substitution bypasses signature integrity for
        component model artifacts.
    links:
      - type: issued-by
        target: CTRL-11
      - type: leads-to-hazard
        target: H-22

  - id: UCA-23
    type: uca
    title: Verify component with core-module-only parser
    status: draft
    description: >
      Component Model Parser uses a core-module-only parser to verify a
      WASM component, ignoring component-specific sections such as type
      imports, nested modules, and component-level metadata. Verification
      succeeds on partial content.
    fields:
      uca-type: providing
      context: >
        WASM component verified using core module parser that ignores
        component sections
      rationale: >
        Component sections not covered by verification allow tampering
        with type bindings and nested module references.
    links:
      - type: issued-by
        target: CTRL-11
      - type: leads-to-hazard
        target: H-21

  - id: UCA-24
    type: uca
    title: Verify hybrid sig WITHOUT checking PQC component
    status: draft
    description: >
      Verification Module checks only the classical Ed25519 component of a
      hybrid signature, skipping the post-quantum ML-DSA component. A
      quantum-capable adversary can forge the classical signature while the
      PQC component is never validated.
    fields:
      uca-type: not-providing
      context: >
        Hybrid signature verified with classical-only code path
      rationale: >
        Skipping PQC verification negates the entire purpose of hybrid
        signatures for quantum resistance.
    links:
      - type: issued-by
        target: CTRL-4
      - type: leads-to-hazard
        target: H-23

  - id: UCA-25
    type: uca
    title: Sign with PQC key WITHOUT domain separation
    status: draft
    description: >
      CLI Controller signs using a post-quantum key without domain
      separation between classical and PQC signature contexts. This allows
      cross-protocol signature reuse where a signature from one context is
      replayed in the other.
    fields:
      uca-type: providing
      context: >
        PQC signing context shares same domain tag as classical signing
      rationale: >
        Lack of domain separation enables signature confusion attacks
        between classical and post-quantum verification paths.
    links:
      - type: issued-by
        target: CTRL-1
      - type: leads-to-hazard
        target: H-23

  - id: UCA-26
    type: uca
    title: Insert cache entry WITHOUT prior verification
    status: draft
    description: >
      Verification Module inserts a proof into the cache without first
      cryptographically verifying it. An attacker who can influence cache
      inputs can pre-populate the cache with invalid or fabricated proofs.
    fields:
      uca-type: providing
      context: >
        Proof inserted into cache before cryptographic verification completes
      rationale: >
        Unverified cache entries poison subsequent lookups, accepting
        invalid proofs from cache.
    links:
      - type: issued-by
        target: CTRL-4
      - type: leads-to-hazard
        target: H-25

  - id: UCA-27
    type: uca
    title: Return cached proof AFTER key revocation
    status: draft
    description: >
      Verification Module returns a cached proof after the underlying
      signing key or certificate has been revoked. The cache does not
      check revocation status, creating a window where revoked signatures
      continue to verify successfully.
    fields:
      uca-type: providing
      context: >
        Cached proof served after certificate revocation but before TTL expiry
      rationale: >
        Stale cached proofs bypass revocation, allowing revoked keys to
        remain effective for the cache TTL duration.
    links:
      - type: issued-by
        target: CTRL-4
      - type: leads-to-hazard
        target: H-26

  - id: UCA-28
    type: uca
    title: Accept Fulcio cert WITHOUT valid SCT
    status: draft
    description: >
      SCT Monitor accepts a Fulcio certificate that does not contain a
      valid Signed Certificate Timestamp, failing to detect certificates
      issued outside of Certificate Transparency monitoring.
    fields:
      uca-type: not-providing
      context: >
        Fulcio certificate accepted without embedded SCT validation
      rationale: >
        Missing SCT check allows mis-issued certificates to go
        undetected by CT monitoring.
    links:
      - type: issued-by
        target: CTRL-12
      - type: leads-to-hazard
        target: H-27

  - id: UCA-29
    type: uca
    title: Verify SCT against wrong CT log key
    status: draft
    description: >
      SCT Monitor verifies the Signed Certificate Timestamp against an
      incorrect or attacker-controlled CT log public key, accepting forged
      SCTs that appear valid but were not issued by a trusted log.
    fields:
      uca-type: providing
      context: >
        SCT verified against stale or attacker-substituted CT log key
      rationale: >
        Wrong key for SCT verification allows forged timestamps to pass,
        undermining Certificate Transparency guarantees.
    links:
      - type: issued-by
        target: CTRL-12
      - type: leads-to-hazard
        target: H-28

  - id: UCA-30
