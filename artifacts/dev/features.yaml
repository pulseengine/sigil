artifacts:
  # ── Requirements ──────────────────────────────────────────────────────

  - id: REQ-1
    type: requirement
    title: Cryptographic signing of WASM modules using Ed25519
    status: approved
    description: >
      sigil must sign WebAssembly modules using Ed25519 signatures and embed
      the signature in a WASM custom section.
    fields:
      priority: must
      category: functional

  - id: REQ-2
    type: requirement
    title: Sigstore keyless signing via OIDC/Fulcio/Rekor
    status: approved
    description: >
      sigil must support keyless signing using OIDC identity tokens, Fulcio
      ephemeral certificates, and Rekor transparency logging.
    fields:
      priority: must
      category: functional

  - id: REQ-3
    type: requirement
    title: Air-gapped verification with trust bundles
    status: approved
    description: >
      sigil must support offline signature verification using pre-provisioned
      trust bundles for embedded and air-gapped devices.
    fields:
      priority: must
      category: functional
    links:
      - type: satisfies
        target: FEAT-2

  - id: REQ-4
    type: requirement
    title: Supply chain provenance via SLSA/in-toto
    status: approved
    description: >
      sigil must generate SLSA-compliant provenance attestations in in-toto
      format.
    fields:
      priority: must
      category: functional
    links:
      - type: satisfies
        target: FEAT-2

  - id: REQ-5
    type: requirement
    title: Memory safety and no unsafe code
    status: approved
    description: >
      sigil must use forbid(unsafe_code) and rely solely on safe Rust for
      memory safety guarantees.
    fields:
      priority: must
      category: non-functional

  - id: REQ-6
    type: requirement
    title: Reproducible builds for SLSA Level 3
    status: draft
    description: >
      Build environment must be reproducible across machines and CI runners
      for SLSA Level 3 compliance.
    fields:
      priority: should
      category: non-functional

  - id: REQ-7
    type: requirement
    title: Post-quantum signature readiness
    status: draft
    description: >
      sigil should support post-quantum signature schemes (SLH-DSA / FIPS 205)
      for long-lived embedded targets.
    fields:
      priority: could
      category: functional

  - id: REQ-8
    type: requirement
    title: Native artifact signing beyond WASM
    status: draft
    description: >
      sigil should sign native artifacts (ELF, MCUboot) produced by synth's
      WASM-to-native transcoding.
    fields:
      priority: should
      category: functional

  - id: REQ-9
    type: requirement
    title: Formal verification of cryptographic operations
    status: draft
    description: >
      Critical cryptographic code paths should be formally verified using
      Rocq/coq-of-rust.
    fields:
      priority: could
      category: non-functional

  - id: REQ-10
    type: requirement
    title: Build environment attestation
    status: draft
    description: >
      Attestation chain should capture build environment metadata (Bazel
      version, Nix hash, toolchain versions).
    fields:
      priority: should
      category: non-functional

  # ── Design Decisions ──────────────────────────────────────────────────

  - id: DD-1
    type: design-decision
    title: Use ed25519-compact over ring for Ed25519
    status: approved
    description: >
      ed25519-compact is a pure-Rust, constant-time implementation suitable
      for no_std environments. ring requires assembly and doesn't support all
      embedded targets.
    fields:
      rationale: >
        ed25519-compact is a pure-Rust, constant-time implementation suitable
        for no_std environments. ring requires assembly and doesn't support all
        embedded targets.
      alternatives: >
        ring (better-known but requires assembly), dalek (good but larger
        dependency surface)
    links:
      - type: satisfies
        target: REQ-1
      - type: satisfies
        target: REQ-5

  - id: DD-2
    type: design-decision
    title: Fail-closed on Rekor unavailability
    status: approved
    description: >
      Silently skipping Rekor verification on network failure would allow
      unverified signatures to pass. Fail-closed ensures security properties
      are maintained at the cost of availability.
    fields:
      rationale: >
        Silently skipping Rekor verification on network failure would allow
        unverified signatures to pass. Fail-closed ensures security properties
        are maintained at the cost of availability.
      alternatives: >
        Fail-open with warning (higher availability, lower security),
        configurable per-invocation (complexity)
    links:
      - type: satisfies
        target: REQ-2

  - id: DD-3
    type: design-decision
    title: STPA-Sec for security analysis over TARA-only
    status: approved
    description: >
      STPA-Sec catches interaction-level and emergent risks (stale caches,
      race conditions, fail-open behaviors) that threat-catalog-based TARA
      misses. TARA retained as compliance layer for ISO 21434.
    fields:
      rationale: >
        STPA-Sec catches interaction-level and emergent risks (stale caches,
        race conditions, fail-open behaviors) that threat-catalog-based TARA
        misses. TARA retained as compliance layer for ISO 21434.
      alternatives: >
        TARA only (simpler, auditor-familiar), STPA-Sec only (misses
        feasibility scoring)
    links:
      - type: satisfies
        target: REQ-5

  # ── Features (mapped from open GitHub issues) ─────────────────────────

  - id: FEAT-1
    type: feature
    title: Post-quantum signature support (SLH-DSA / FIPS 205)
    status: draft
    description: >
      Add SLH-DSA as signing/verification backend alongside Ed25519. Evaluate
      parameter sets for signature size vs security tradeoffs. Maintain no_std
      compatibility.
    fields:
      github-issue: 46
      phase: future
    links:
      - type: satisfies
        target: REQ-7

  - id: FEAT-2
    type: feature
    title: Sign native artifacts from synth (ELF / MCUboot)
    status: in-progress
    description: >
      Implement format-aware signing backends for MCUboot TLV (embedded
      Cortex-M) and ELF .signature section (Linux targets). Carry attestation
      chain across WASM-to-native boundary.
    fields:
      github-issue: 47
      phase: phase-2
    links:
      - type: satisfies
        target: REQ-8

  - id: FEAT-3
    type: feature
    title: Add Nix flake for reproducible builds
    status: draft
    description: >
      Add flake.nix providing development shell with pinned toolchain
      versions. Integrate with Bazel build for hermetic CI.
    fields:
      github-issue: 48
      phase: phase-2
    links:
      - type: satisfies
        target: REQ-6

  - id: FEAT-4
    type: feature
    title: Build environment attestation
    status: draft
    description: >
      Capture build environment metadata (Bazel version, Nix hash, rustc
      version) as part of SLSA provenance attestation.
    fields:
      github-issue: 49
      phase: phase-2
    links:
      - type: satisfies
        target: REQ-10

  - id: FEAT-5
    type: feature
    title: Rocq formal verification
    status: draft
    description: >
      Add Rocq proofs for cryptographic algorithm correctness and coq-of-rust
      integration for Rust implementation verification via rules_rocq_rust.
    fields:
      github-issue: 32
      phase: future
    links:
      - type: satisfies
        target: REQ-9

  - id: REQ-11
    type: requirement
    title: ELF and MCUboot signing end-to-end test
    status: draft
    fields:
      category: functional
      priority: should
      verification-criteria: End-to-end test signs an ELF binary and MCUboot image, then verifies signatures match expected hashes
    links:
      - type: satisfies
        target: FEAT-2

  - id: DD-4
    type: design-decision
    title: Three-layer formal verification pyramid (Kani, Verus, Rocq)
    status: approved
    description: >
      Adopt synth's three-layer verification pyramid for sigil's
      cryptographic and parsing code. Each layer targets different
      property classes with the most appropriate tool.
    fields:
      rationale: >
        Layer 1 (Kani) provides bounded model checking directly on Rust
        source for no-panic guarantees and roundtrip correctness. Layer 2
        (Verus via rules_verus) adds SMT-backed pre/post specs for
        functional correctness on unbounded inputs. Layer 3 (Rocq via
        rules_rocq_rust and coq-of-rust) provides mechanized proofs for
        ISO 26262 certification evidence. Lean4 with Mathlib (rules_lean)
        covers algebraic properties of Ed25519 curve operations.
      alternatives: >
        Single-tool approach (simpler but misses properties each tool
        excels at), external audit only (no continuous verification)
    links:
      - type: satisfies
        target: REQ-9

  - id: FEAT-6
    type: feature
    title: WASM-to-native transcoding attestation protocol
    status: in-progress
    description: >
      Define and implement the attestation protocol for carrying cryptographic
      provenance across the WASM-to-native compilation boundary. Enables synth
      to produce signed native binaries with full chain-of-custody from source
      WASM through AOT compilation to ELF/MCUboot output.
    fields:
      github-issue: 47
      phase: phase-2
    links:
      - type: satisfies
        target: REQ-4
      - type: satisfies
        target: REQ-8

  - id: DD-5
    type: design-decision
    title: In-toto predicate format for transcoding attestation
    status: approved
    description: >
      Use in-toto Statement v1 with a custom wsc.dev/transcoding/v1 predicate
      type for recording WASM-to-native compilation provenance. The predicate
      captures source WASM digest and signature status, compiler identity,
      target architecture, and compilation parameters.
    fields:
      rationale: >
        In-toto provides the standardized envelope and statement framework
        already used by sigil for WASM attestations. Extending with a
        transcoding-specific predicate maintains consistency with SLSA
        provenance while adding compiler-specific fields for the
        WASM-to-native boundary.
      alternatives: >
        Custom JSON format (not standardized), SLSA provenance only
        (lacks compiler fields), embedded ELF notes only (not portable)
    links:
      - type: satisfies
        target: REQ-4
      - type: satisfies
        target: REQ-8

  - id: REQ-12
    type: requirement
    title: Nix flake for reproducible development and CI builds
    status: approved
    description: >
      Project must provide a Nix flake that pins all build tool versions
      (Rust 1.90.0, Bazel 8.5.1, wasm-tools) for reproducible development
      environments and CI builds. Prerequisite for SLSA Level 3 compliance.
    fields:
      priority: must
      category: non-functional
    links:
      - type: satisfies
        target: FEAT-3

  - id: REQ-13
    type: requirement
    title: Build environment metadata in SLSA provenance
    status: approved
    description: >
      Attestation chain must capture build environment metadata including
      Rust compiler version, Bazel version, Nix flake lock hash, and
      host platform as SLSA provenance internal parameters. Addresses
      Ferrocene RUSTC_CSTR_0030 for tool version verification.
    fields:
      priority: must
      category: non-functional
    links:
      - type: satisfies
        target: FEAT-4

  - id: FEAT-7
    type: feature
    title: Cosign delegation with binary integrity verification
    status: in-progress
    description: >
      Safe cosign subprocess delegation for container image signing with
      binary integrity verification (AS-20), tag-to-digest resolution
      (AS-18), digest-bound signatures (AS-21), and OCI image reference
      parsing. Phase 3.1 of the STPA-Sec roadmap.
    fields:
      phase: phase-3
    links:
      - type: satisfies
        target: REQ-2

  - id: FEAT-8
    type: feature
    title: Rekor inclusion proof caching
    status: in-progress
    description: >
      TTL-based cache for verified Rekor inclusion proofs to provide
      availability resilience during transient Rekor outages. Cache is
      optimization-only and never weakens fail-closed guarantees (DD-2).
      Phase 4.1 of the STPA-Sec roadmap.
    fields:
      phase: phase-4
    links:
      - type: satisfies
        target: REQ-2

  - id: DD-6
    type: design-decision
    title: Cosign subprocess delegation over native sigstore-rs
    status: approved
    description: >
      Delegate container signing to the cosign binary rather than
      implementing OCI signing natively. Reduces attack surface from
      protobuf and registry client dependencies while leveraging
      cosign's ecosystem maturity.
    fields:
      rationale: >
        Cosign is the de facto standard for container signing with wide
        ecosystem support. Native implementation via sigstore-rs would
        add significant protobuf, OCI client, and registry dependencies
        to the security-critical codebase. Binary delegation with
        integrity verification (SHA-256 hash check) limits trust to the
        verified cosign binary.
      alternatives: >
        sigstore-rs native (full control, no subprocess, but heavy deps),
        notation (Microsoft alternative, less ecosystem adoption)
