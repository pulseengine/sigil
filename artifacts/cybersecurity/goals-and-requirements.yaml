  # Requirements
  - id: CR-18
    type: cybersecurity-req
    title: Component model section handling must be complete
    status: approved
    description: >
      WASM Component Model signing must correctly parse, preserve, and sign
      all component sections including nested modules, ensuring no section
      is silently dropped or corrupted during the signing process.
    fields:
      req-type: integrity
      priority: must
      verification-criteria: >
        Component model roundtrip preserves all sections; nested modules
        are correctly handled; no silent section dropping.
    links:
      - type: derives-from
        target: CG-13

  - id: CR-19
    type: cybersecurity-req
    title: Hybrid signature verification must be all-or-nothing
    status: approved
    description: >
      When post-quantum hybrid signing is configured, verification must
      require both the classical (Ed25519) and post-quantum (SLH-DSA)
      signatures to be present and valid. Partial signatures must be
      rejected to prevent downgrade attacks.
    fields:
      req-type: integrity
      priority: must
      verification-criteria: >
        Verification rejects modules with only classical or only PQC
        signature when hybrid mode is configured.
      # Honesty marker: Phase 3 PQC roadmap; hybrid Ed25519+SLH-DSA
      # verification pipeline (CD-24) is still in draft. No hybrid
      # verifier code path exists in src/lib yet.
      implementation-status: design-only
    links:
      - type: derives-from
        target: CG-1

  - id: CR-20
    type: cybersecurity-req
    title: Proof cache entries must be invalidated on key revocation
    status: approved
    description: >
      Rekor proof cache entries must be invalidated when the associated
      signing key is revoked, preventing acceptance of modules signed by
      compromised keys through stale cache hits.
    fields:
      req-type: integrity
      priority: must
      verification-criteria: >
        Cache lookup returns miss for entries whose signing key has been
        revoked; revocation triggers immediate cache invalidation.
      # Honesty marker: revocation-aware proof cache is design-only.
      # No code exists today that wires key-revocation events to the
      # proof cache; CR-20 has neither cybersecurity-design nor
      # cybersecurity-verification linked.
      implementation-status: design-only
    links:
      - type: derives-from
        target: CG-8

  - id: CR-21
    type: cybersecurity-req
    title: Fulcio certificates MUST embed valid SCTs from trusted CT logs
    status: approved
    description: >
      Fulcio certificates must contain Signed Certificate Timestamps (SCTs)
      from trusted Certificate Transparency logs. Verification must reject
      certificates without valid SCTs to ensure transparency guarantees.
    fields:
      req-type: authentication
      priority: must
      verification-criteria: >
        Verification rejects Fulcio certificates missing SCTs or containing
        SCTs from untrusted CT logs.
      # Honesty marker: paired with SC-26. Cryptographic verification of
      # SCT signatures against trusted CT log keys is design-only — see
      # the SC-26 entry in artifacts/stpa/losses-and-hazards.yaml.
      implementation-status: design-only
    links:
      - type: derives-from
        target: CG-7

  - id: CR-22
    type: cybersecurity-req
    title: Checkpoint persistence MUST be atomic and integrity-protected
    status: approved
    description: >
      Rekor checkpoint files must be written atomically using temp-file-plus-
      rename to prevent partial writes. Checkpoint integrity must be verified
      on load to detect corruption.
    fields:
      req-type: integrity
      priority: must
      verification-criteria: >
        Checkpoint writes are atomic; partial writes do not corrupt existing
        checkpoints; integrity check detects tampered checkpoints on load.
      # Honesty marker: atomic checkpoint store (SC-28) is design-only.
      # No write-then-rename checkpoint persistence exists in code today.
      implementation-status: design-only
    links:
      - type: derives-from
        target: CG-8

  - id: CR-23
    type: cybersecurity-req
    title: Bundle serialization MUST preserve all verification material fields
    status: approved
    description: >
      Sigstore bundle serialization and deserialization must preserve all
      verification material fields including certificates, inclusion proofs,
      and signed timestamps without loss or reordering.
    fields:
      req-type: integrity
      priority: must
      verification-criteria: >
        Bundle roundtrip serialization preserves all fields; schema validation
        rejects bundles with missing required fields.
    links:
      - type: derives-from
        target: CG-3

  - id: CR-24
    type: cybersecurity-req
    title: DSSE verification must support configurable threshold policies
    status: approved
    description: >
      DSSE envelope verification must support configurable signature threshold
      policies (e.g., require N-of-M valid signatures) to enable multi-party
      signing workflows.
    fields:
      req-type: authentication
      priority: should
      verification-criteria: >
        Verification enforces configured threshold; rejects envelopes with
        fewer valid signatures than the threshold requires.
      # Honesty marker: configurable N-of-M threshold policy is design-only.
      # `src/lib/src/dsse.rs` exists but does not yet expose a runtime
      # threshold-policy configuration surface; CR-24 has no
      # cybersecurity-design or cybersecurity-verification artifact yet.
      implementation-status: design-only
    links:
      - type: derives-from
        target: CG-1

