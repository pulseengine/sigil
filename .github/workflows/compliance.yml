name: Compliance Report

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      version:
        description: 'Version label for the report'
        type: string
        default: ''
      theme:
        description: 'Color theme (dark or light)'
        type: string
        default: 'dark'
    outputs:
      archive-path:
        description: 'Path to the compliance archive'
        value: ${{ jobs.compliance.outputs.archive-path }}
      validation-result:
        description: 'PASS or FAIL'
        value: ${{ jobs.compliance.outputs.validation-result }}
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the report'
        type: string
        default: ''
      theme:
        description: 'Color theme (dark or light)'
        type: choice
        options: [dark, light]
        default: 'dark'

jobs:
  compliance:
    name: Generate compliance report
    runs-on: ubuntu-latest
    outputs:
      archive-path: ${{ steps.report.outputs.archive-path }}
      validation-result: ${{ steps.report.outputs.validation-result }}
    steps:
    - uses: actions/checkout@v4

    - name: Generate compliance report
      id: report
      uses: pulseengine/rivet/.github/actions/compliance@v0.6.0
      with:
        theme: ${{ inputs.theme }}
        report-label: ${{ inputs.version }}
        rivet-version: v0.3.0

    - name: Upload archive
      uses: actions/upload-artifact@v4
      with:
        name: compliance-report
        path: ${{ steps.report.outputs.archive-path }}
