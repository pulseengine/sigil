name: Supply Chain Security

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'supply-chain/**'
      - 'deny.toml'
  pull_request:
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'supply-chain/**'
      - 'deny.toml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  cargo-vet:
    name: Cargo Vet
    runs-on: [self-hosted, linux, x64, light]
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: rustup update stable && rustup default stable
    - name: Install cargo-vet
      run: cargo install --locked cargo-vet
    - name: Run cargo vet
      run: cargo vet
      continue-on-error: true

  cargo-audit:
    name: Cargo Audit
    # Stays on ubuntu-latest: smithy-shipped cargo-audit's bundled rustsec parser rejects RUSTSEC-2026-0037 ("unsupported CVSS version: 4.0"). Move back once smithy bumps cargo-audit to 0.22.1+.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: rustup update stable && rustup default stable
    - name: Install cargo-audit
      run: cargo install --locked cargo-audit
    - name: Run cargo audit
      run: |
        cargo audit \
          --ignore RUSTSEC-2025-0046 \
          --ignore RUSTSEC-2025-0118 \
          --ignore RUSTSEC-2026-0006 \
          --ignore RUSTSEC-2026-0020 \
          --ignore RUSTSEC-2026-0021 \
          --ignore RUSTSEC-2025-0057 \
          --ignore RUSTSEC-2025-0134 \
          --ignore RUSTSEC-2024-0436

  cargo-deny:
    name: Cargo Deny
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    # EmbarkStudios/cargo-deny-action@v2 launches a rootless container which
    # fails on smithy (newuidmap is setuid + NoNewPrivileges=true on the
    # runner unit). Direct install + invocation, per smithy migration playbook.
    # bans/licenses/sources only (advisories handled by cargo-audit job).
    - run: cargo install cargo-deny --locked --version 0.16.4 || true
    - run: cargo deny check bans licenses sources

  mutants:
    name: Mutation Testing
    runs-on: [self-hosted, linux, x64, lean-mem]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@nightly
    - uses: Swatinem/rust-cache@v2
    - name: Install cargo-mutants
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-mutants
    - name: Run mutation testing on security-critical modules
      run: |
        cargo mutants -p wsc --timeout 120 --jobs 4 --output mutants-out \
          -f src/lib/src/signature/ \
          -f src/lib/src/dsse.rs \
          -f src/lib/src/format/ \
          -E "proofs::" \
          -E "key_id" \
          -- --lib
    - name: Check surviving mutants
      run: |
        if [ -f mutants-out/missed.txt ]; then
          MISSED=$(wc -l < mutants-out/missed.txt | tr -d ' ')
        else
          MISSED=0
        fi
        echo "Surviving mutants: $MISSED"
        if [ "$MISSED" -gt 0 ]; then
          echo "::error::$MISSED mutant(s) survived — tests must catch all mutations in security-critical code"
          cat mutants-out/missed.txt | head -30
          exit 1
        fi
        echo "All mutants killed!"
    - name: Upload mutants report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mutants-report
        path: mutants-out/
