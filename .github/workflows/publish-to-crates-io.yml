# The purpose of this workflow is to publish the workspace's crates
# whenever a tag is created. This uses GitHub Actions OIDC tokens for
# trusted publishing instead of long-lived API tokens.

name: "Publish to crates.io"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
    - 'v*'

jobs:
  publish:
    if: github.repository == 'pulseengine/sigil'
    # Stays on ubuntu-latest: crates.io trusted publishing via OIDC; keep release publication on a vetted, well-known runner image until self-hosted publication path is independently audited.
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: rustup update stable && rustup default stable
    
    - name: Build publish script
      run: rustc scripts/publish.rs
    
    - name: Authenticate with crates.io
      uses: rust-lang/crates-io-auth-action@v1
      id: auth
      with:
        crates-io-token: ${{ secrets.CRATES_IO_TOKEN }}
    
    - name: Publish crates
      run: ./publish publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}