name: Formal Verification

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/src/**'
      - 'src/lib/tests/**'
      - 'lean/**'
      - 'MODULE.bazel'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'src/lib/src/**'
      - 'src/lib/tests/**'
      - 'lean/**'
      - 'MODULE.bazel'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

jobs:
  verus-proofs:
    name: Verus SMT Verification
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Verify Merkle proofs (CV-20, CV-21)
      run: bazel build //src/lib/src/verus_proofs:wsc_merkle_proofs
      continue-on-error: true

    - name: Run Verus tests
      run: bazel test //src/lib/src/verus_proofs:wsc_merkle_verify
      continue-on-error: true

  kani-proofs:
    name: Kani ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: varint
            harness: wasm_module::varint
          - module: merkle
            harness: signature::keyless::merkle
          - module: dsse
            harness: dsse
          - module: format
            harness: format
          - module: wasm_module
            harness: wasm_module::tests
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        rustup update stable
        rustup default stable

    - name: Install Kani
      run: |
        cargo install --locked kani-verifier
        cargo kani setup

    - name: Run Kani ${{ matrix.module }} proofs
      env:
        HARNESS: ${{ matrix.harness }}
      run: cargo kani -p wsc --default-unwind 4 --output-format terse --harness "$HARNESS"
      timeout-minutes: 60
      continue-on-error: true

  rocq-proofs:
    name: Rocq/coq-of-rust Translation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-rocq
        repository-cache: true

    - name: Translate PAE to Rocq and compile proof
      run: bazel build //verification/rocq:pae_verified
      timeout-minutes: 30
      # coq-of-rust needs Rust nightly with LLVM internals — Nix provides
      # this locally but CI may need LIBRARY_PATH configuration.
      continue-on-error: true
