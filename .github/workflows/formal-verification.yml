name: Formal Verification

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/src/**'
      - 'src/lib/tests/**'
      - 'lean/**'
      - 'MODULE.bazel'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'src/lib/src/**'
      - 'src/lib/tests/**'
      - 'lean/**'
      - 'MODULE.bazel'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

jobs:
  verus-proofs:
    name: Verus SMT Verification
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Verify Merkle proofs (CV-20, CV-21)
      run: bazel build //src/lib/src/verus_proofs:wsc_merkle_proofs
      continue-on-error: true

    - name: Run Verus tests
      run: bazel test //src/lib/src/verus_proofs:wsc_merkle_verify
      continue-on-error: true

  kani-proofs:
    name: Kani Bounded Model Checking
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        rustup update stable
        rustup default stable

    - name: Install Kani
      run: |
        cargo install --locked kani-verifier
        cargo kani setup

    - name: Run Kani proofs — fast harnesses (14 proofs)
      run: |
        cargo kani -p wsc --harness proof_format_detection --default-unwind 4 --output-format terse
        cargo kani -p wsc --harness proof_consistency_validation --default-unwind 4 --output-format terse
        cargo kani -p wsc --harness proof_content_type_ids --default-unwind 4 --output-format terse
        cargo kani -p wsc --harness proof_domain_separation --default-unwind 4 --output-format terse
        cargo kani -p wsc --harness proof_put_get32_roundtrip --default-unwind 8 --output-format terse
        cargo kani -p wsc --harness proof_get32_no_panic --default-unwind 8 --output-format terse
        cargo kani -p wsc --harness proof_get32_no_overflow --default-unwind 8 --output-format terse
        cargo kani -p wsc --harness proof_get_slice_bounded --default-unwind 8 --output-format terse
        cargo kani -p wsc --harness proof_put_deterministic --default-unwind 8 --output-format terse
      timeout-minutes: 45

    - name: Run Kani proofs — DSSE PAE (5 proofs)
      run: cargo kani -p wsc --harness proof_pae --default-unwind 16 --output-format terse
      timeout-minutes: 30
      continue-on-error: true
