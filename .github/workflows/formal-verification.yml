name: Formal Verification

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/src/**'
      - 'src/lib/tests/**'
      - 'lean/**'
      - 'MODULE.bazel'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'src/lib/src/**'
      - 'src/lib/tests/**'
      - 'lean/**'
      - 'MODULE.bazel'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

jobs:
  verus-proofs:
    name: Verus SMT Verification
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Verify Merkle proofs (CV-20, CV-21)
      run: bazel build //src/lib/src/verus_proofs:wsc_merkle_proofs
      continue-on-error: true

    - name: Run Verus tests
      run: bazel test //src/lib/src/verus_proofs:wsc_merkle_verify
      continue-on-error: true

  kani-proofs:
    name: Kani Bounded Model Checking
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        rustup update stable
        rustup default stable

    - name: Install Kani
      run: |
        cargo install --locked kani-verifier
        cargo kani setup

    - name: Run Kani proofs — format detection (4 proofs)
      run: cargo kani -p wsc --harness "format::proofs" --default-unwind 4 --output-format terse
      timeout-minutes: 10

    - name: Run Kani proofs — varint (5 proofs)
      run: cargo kani -p wsc --harness "varint::proofs" --default-unwind 4 --output-format terse
      timeout-minutes: 10

    - name: Run Kani proofs — merkle (5 proofs)
      run: cargo kani -p wsc --harness "merkle::proofs" --default-unwind 4 --output-format terse
      timeout-minutes: 10

    - name: Run Kani proofs — DSSE PAE (5 proofs)
      run: cargo kani -p wsc --harness "dsse::proofs" --default-unwind 16 --output-format terse
      timeout-minutes: 15
